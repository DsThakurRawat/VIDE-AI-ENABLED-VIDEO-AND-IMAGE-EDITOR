version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vide-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: videdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d videdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: vide-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vide-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: vide-gateway
    environment:
      PORT: "8080"
      DATABASE_URL: "host=postgres user=admin password=password dbname=videdb port=5432 sslmode=disable"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_PASSWORD: password123
      MINIO_BUCKET: vide-uploads
      JWT_SECRET: "change-this-in-production"
      NLP_WORKER_URL: "http://worker:8000/nlp/parse"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vide-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - media_data:/media
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "worker.py"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  media_data:
